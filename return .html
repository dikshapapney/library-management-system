<!DOCTYPE html>
<html>
<body>

<h2>Return Book</h2>

<form onsubmit="returnBook(event)">
    Book Name: <input type="text" required><br><br>
    Serial No: <input type="text" required><br><br>

    <button type="submit">Return</button>
</form>

<p id="msg"></p>

<script>
function returnBook(e){
    e.preventDefault();

    let serial = document.getElementById("serial").value;

    if(serial === ""){
        document.getElementById("msg").innerHTML = "Serial No required!";
        return;
    }

    window.location.href = "fine.html";
}
</script>

</body>
</html>
