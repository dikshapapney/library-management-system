<!DOCTYPE html>
<html>
<body>

<h2>Fine Payment</h2>

<p>Fine Amount: 0</p>

<form onsubmit="payFine(event)">
    Paid: <input type="checkbox" id="paid"><br><br>
    Remarks: <input type="text"><br><br>

    <button type="submit">Confirm</button>
</form>

<p id="msg"></p>

<script>
function payFine(e){
    e.preventDefault();

    let fine = 10; // example fine
    let paid = document.getElementById("paid").checked;

    if(fine > 0 && !paid){
        document.getElementById("msg").innerHTML = "Please pay fine!";
        return;
    }

    document.getElementById("msg").innerHTML = "Transaction Completed!";
}
</script>

</body>
</html>
