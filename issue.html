<!DOCTYPE html>
<html>
<body>

<h2>Issue Book</h2>

<form onsubmit="issueBook(event)">
    Book Name: <input type="text" id="book" required><br><br>
    Author: <input type="text" value="Auto-filled" readonly><br><br>

    Issue Date: <input type="date" id="issue" required><br><br>
    Return Date: <input type="date" id="return"><br><br>

    <button type="submit">Issue</button>
</form>

<p id="msg"></p>
<script>
function issueBook(e){
    e.preventDefault();

    let issue = new Date(document.getElementById("issue").value);
    let today = new Date();

    if(issue < today){
        document.getElementById("msg").innerHTML = "Issue date cannot be past!";
        return;
    }

    let returnDate = new Date(issue);
    returnDate.setDate(returnDate.getDate() + 15);

    document.getElementById("msg").innerHTML = 
        "Book Issued! Return before: " + returnDate.toDateString();

    localStorage.setItem("returnDate", returnDate);
}
</script>

</body>
</html>
